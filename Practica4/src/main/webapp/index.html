<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>

    <style>
        body {
            background-color: #7b4ca0;
            font-family: Arial;
            color: white;
            padding: 15px;
        }


        textarea {
             width: 400px;
             padding: 4px;
             vertical-align: middle;  /* alineación con botón  */
        }


        input {
          padding: 4px;
          margin-right: 10px;
          width: 150px;

        }

        label {
            margin-right: 5px;
            font-weight: bold
       }

        button {
            padding: 6px 12px;
            margin-left: 10px;
        }

    </style>

<body>
<h1 style="text-align:center;">Registros</h1>
<br><br>
<form action="registro" method="post">
    <label>Nombre</label>
    <input type="text" name="nombre">

    <label>Email</label>
    <input type ="text" name="email">

    <label>Password</label>
    <input type ="password" name="password">


    <button type="submit">Registro</button>

</form>


</body>
</html>
